spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/elearning}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
file.upload-dir=uploads/

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jasypt.encryptor.password=${JASYPT_PASSWORD:change-me}

security.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me}
security.jwt.refresh-secret=${JWT_REFRESH_SECRET:change-me-change-me-change-me-change-me-change-me-change-me}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:7200000}
security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}
security.jwt.cookie-secure=${JWT_COOKIE_SECURE:false}
security.jwt.cookie-same-site=${JWT_COOKIE_SAME_SITE:Lax}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://192.168.0.11:5173,http://192.168.126.66:5173}
