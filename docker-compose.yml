services:
  mysql:
    image: mysql:8.4
    container_name: tutoring_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-elearning}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./Backend/tutoring
      dockerfile: Dockerfile
    container_name: tutoring_backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-elearning}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER:-app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-app}
      JASYPT_PASSWORD: ${JASYPT_PASSWORD:-change-me}
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-change-me-change-me-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-change-me-change-me-change-me-change-me-change-me}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-false}
      JWT_COOKIE_SAME_SITE: ${JWT_COOKIE_SAME_SITE:-Lax}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./Frontend/tutoringfrontend
      dockerfile: Dockerfile
      args:
        VITE_APP_ENV: local
        VITE_BASE_URL: http://localhost:8080
        VITE_WS_BASE_URL: http://localhost:5173
    container_name: tutoring_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
  uploads_data:
